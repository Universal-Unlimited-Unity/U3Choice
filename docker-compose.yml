version: '3.8'
services:
  database:
    image: postgres:15.3
    container_name: database
    env_file:
      - ./secret/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7.0.12
    container_name: redis
    ports:
      - "6379:6379"
    env_file:
      - ./secret/.env
    volumes:
      - redis_data:/data
  backend:
    build:
      context: .
      dockerfile: ./backend/dockerfile
    container_name: backend
    env_file:
      - ./secret/.env
    ports:
      - "8000:8000"
    depends_on:
      - database
      - redis
volumes:
  postgres_data:
  redis_data:
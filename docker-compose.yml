services:
  database:
    image: postgres:15.3
    container_name: database
    env_file:
      - backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7.0.12
    container_name: redis
    ports:
      - "6379:6379"
    env_file:
      - backend/.env
    volumes:
      - redis_data:/data
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: backend
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - database
      - redis
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
        - action: rebuild
          path: ./backend/requirements.txt
  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: frontend
    env_file:
      - frontend/.env
    ports:
      - "5173:5173"
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
volumes:
  postgres_data:
  redis_data: